---
name: Molecule

on:
  pull_request:
  push:
    branches:
      - main

defaults:
  run:
    working-directory: 'ialejandro.harbor'

jobs:
  molecule:
    name: Molecule - ${{ matrix.distro }}
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        distro:
          - amazonlinux2023
          - debian12
          - ubuntu2204
          - ubuntu2404
          - rockylinux9

    steps:
      - name: Check out the codebase
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          path: 'ialejandro.harbor'

      - name: Set up Python3
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.13' # Can't go to 3.14+ until Ansible 13.x

      - name: Install dependencies
        run: pip3 install ansible molecule molecule-plugins[docker]

      - name: Run Molecule tests
        run: molecule test
        env:
          MOLECULE_DISTRO: ${{ matrix.distro }}
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
